{% extends 'main/layout/layout.html' %}

{% block content %}
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

<div style="background: #000; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div style="background: #111; width: 100%; max-width: 550px; padding: 40px; border-radius: 24px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
        
        <h2 style="color: #fff; font-weight: 800; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; font-size: 24px;">
            <span class="material-symbols-outlined" style="font-size: 32px;">edit_note</span> Edytuj Ogłoszenie
        </h2>
        
        <form method="post" enctype="multipart/form-data" novalidate>
            {% csrf_token %}
            
            <style>
                
                .dark-field-wrapper .errorlist {
                    display: none;
                }

                .dark-field-wrapper p { margin-bottom: 20px; }
                .dark-field-wrapper label { display: block; color: #666; font-size: 11px; text-transform: uppercase; font-weight: bold; margin-bottom: 8px; letter-spacing: 1px; }
                
                
                .dark-field-wrapper input, .dark-field-wrapper textarea, .dark-field-wrapper select {
                    width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 14px; border-radius: 12px; font-size: 14px; transition: all 0.3s ease;
                }
                
                
                .dark-field-wrapper input:focus, .dark-field-wrapper textarea:focus {
                    outline: none; border-color: #ca9eff; background: #222; box-shadow: 0 0 0 4px rgba(202, 158, 255, 0.1);
                }

                
                .btn-save { 
                    width: 100%; 
                    background: #ca9eff; 
                    color: #000; 
                    border: none; 
                    padding: 16px; 
                    border-radius: 12px; 
                    font-weight: 800; 
                    cursor: pointer; 
                    transition: all 0.3s ease; 
                    margin-top: 20px; 
                    display: flex; 
                    align-items: center; 
                    justify-content: center; 
                    gap: 8px; 
                    font-size: 16px;
                }

                .btn-save:hover { 
                    background: #b380ff; 
                    transform: translateY(-2px); 
                    box-shadow: 0 5px 15px rgba(202, 158, 255, 0.4);
                }
                
                .btn-cancel { display: block; text-align: center; color: #666; text-decoration: none; margin-top: 20px; font-size: 14px; font-weight: 600; transition: 0.3s; }
                .btn-cancel:hover { color: #fff; }
            </style>

            <div class="dark-field-wrapper">
                {{ form.as_p }}
            </div>

            <button type="submit" class="btn-save">
                <span class="material-symbols-outlined">save</span> Zapisz zmiany
            </button>
            
            <a href="{% url 'news_detail' object.id %}" class="btn-cancel">Anuluj edycję</a>
        </form>
    </div>
</div>
{% endblock %}
