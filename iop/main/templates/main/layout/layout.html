{% load static %}
<!doctype html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <title>{% block title %}{% endblock %} | IOP</title>
    <link rel="stylesheet" href="{% static 'main/css/main.css' %}">
    <link rel="icon" type="image/png" href="{% static 'main/img/Logo_IOP.png' %}?v=2">

    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }
        main {
            flex: 1; 
        }
    </style>
</head>
<body>

    {% include 'main/layout/sidebar.html' %}

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer style="background-color: #181818; color: #ffffff; padding: 40px 0; border-top: 1px solid #282828; font-family: 'Inter', sans-serif;">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px;">
            
            <div>
                <h3 style="color: #ffffff; margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -1px;">IOP</h3>
                <p style="font-size: 13px; margin-top: 5px;">&copy; 2026 Wszystkie prawa zastrzeżone.</p>
            </div>

            <div style="display: flex; gap: 20px;">
                <span class="material-symbols-outlined" style="color: #909296; cursor: pointer; transition: 0.3s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#909296'">share</span>
                <span class="material-symbols-outlined" style="color: #909296; cursor: pointer; transition: 0.3s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#909296'">mail</span>
                <span class="material-symbols-outlined" style="color: #909296; cursor: pointer; transition: 0.3s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#909296'">forum</span>
            </div>

            <div style="display: flex; gap: 30px; font-size: 14px; font-weight: 600;">
                <a href="/about" style="color: #909296; text-decoration: none; transition: 0.3s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#909296'">O nas</a>
                <a href="/contact" style="color: #909296; text-decoration: none; transition: 0.3s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#909296'">Kontakt</a>
                <a href="/regulamin" style="color: #909296; text-decoration: none; transition: 0.3s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#909296'">Regulamin</a>
            </div>
        </div>
    </footer>

</body>
</html>
